services:
  - type: web
    name: webchat
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --worker-class gevent --workers 1 --bind 0.0.0.0:$PORT webchat:app
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: webchat-db
          property: connectionString
    plan: free

databases:
  - name: webchat-db
    plan: free